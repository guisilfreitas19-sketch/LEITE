<div class="glass-card p-6 border-l-4 border-blue-500">
  <h3 class="label-text mb-4 text-blue-400 italic">DIETA INDIVIDUAL (POR ANIMAL)</h3>
  <div class="space-y-4">
    <div class="grid grid-cols-2 gap-2">
      <div class="relative">
        <input id="siloQtd" type="number" value="15" oninput="calcular()" class="input-field !text-base">
        <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[10px] text-zinc-500 font-bold">SILO KG</span>
      </div>
      <input id="siloPreco" type="text" value="R$ 0,45" oninput="fMoeda(this)" class="input-field !text-base">
    </div>
    <div class="grid grid-cols-2 gap-2">
      <div class="relative">
        <input id="sojaQtd" type="number" value="2" oninput="calcular()" class="input-field !text-base">
        <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[10px] text-zinc-500 font-bold">SOJA KG</span>
      </div>
      <input id="sojaPreco" type="text" value="R$ 2,00" oninput="fMoeda(this)" class="input-field !text-base">
    </div>
    <div class="grid grid-cols-2 gap-2">
      <div class="relative">
        <input id="trigoQtd" type="number" value="2" oninput="calcular()" class="input-field !text-base">
        <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[10px] text-zinc-500 font-bold">TRIGO KG</span>
      </div>
      <input id="trigoPreco" type="text" value="R$ 1,50" oninput="fMoeda(this)" class="input-field !text-base">
    </div>
  </div>
</div>
