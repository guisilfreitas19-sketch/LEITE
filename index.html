<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeitePro v3.0 | Gestão de Precisão</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-dark: #020617;
      --card-dark: #0f172a;
      --accent: #22c55e;
    }
    body { background-color: var(--bg-dark); color: #f8fafc; font-family: sans-serif; }
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 1.5rem; }
    .input-field { background: #1e293b; border: 1px solid #334155; color: #fff; border-radius: 0.75rem; padding: 0.75rem; width: 100%; transition: all 0.2s; text-align: right; font-family: monospace; }
    .input-field:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); }
    .label-text { color: #94a3b8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; display: block; }
    .accordion-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-green-900/40">LP</div>
        <div>
          <h1 class="text-2xl font-black tracking-tight">LeitePro <span class="text-green-500">v3.0</span></h1>
          <p class="text-zinc-500 text-sm font-medium">Poços de Caldas • Gestão de Custo Diário</p>
        </div>
      </div>
      <div class="glass-card px-6 py-3 flex items-center gap-8">
        <div class="text-center">
          <p class="label-text">Custo/Litro Atual</p>
          <strong id="heroMetric" class="text-3xl font-black text-green-400">R$ 0,00</strong>
        </div>
        <div class="h-10 w-[1px] bg-zinc-800"></div>
        <div id="relogio" class="text-zinc-400 font-mono text-lg">00:00:00</div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <aside class="lg:col-span-4 space-y-4">
        <div class="glass-card p-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-green-500 rounded-full"></span>
            Dados da Produção
          </h3>
          
          <div class="space-y-4">
            <div>
              <label class="label-text">Litros Produzidos / Dia</label>
              <input id="litros" type="number" placeholder="0.00" class="input-field text-xl text-white">
            </div>
            <div>
              <label class="label-text">Preço de Venda (R$)</label>
              <input id="precoVenda" type="text" placeholder="R$ 0,00" oninput="formatarMoeda(this)" class="input-field text-xl text-yellow-500">
            </div>
          </div>
        </div>

        <div class="glass-card overflow-hidden">
          <button onclick="toggleSection('alimentacao')" class="accordion-btn hover:bg-white/5 transition-colors">
            <span class="font-bold text-sm uppercase tracking-wider">1. Alimentação (Concentrados)</span>
            <span id="icon-alimentacao" class="text-zinc-500">▼</span>
          </button>
          
          <div id="section-alimentacao" class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="label-text">Soja (R$/KG)</label>
                <input id="sojaKg" type="text" oninput="formatarMoeda(this)" class="input-field">
              </div>
              <div>
                <label class="label-text">Soja (KG/DIA)</label>
                <input id="sojaQtd" type="number" class="input-field">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="label-text">Trigo (R$/KG)</label>
                <input id="trigoKg" type="text" oninput="formatarMoeda(this)" class="input-field">
              </div>
              <div>
                <label class="label-text">Trigo (KG/DIA)</label>
                <input id="trigoQtd" type="number" class="input-field">
              </div>
            </div>
            <div>
              <label class="label-text">Silagem (R$/KG)</label>
              <div class="grid grid-cols-2 gap-3">
                <input id="silagemKg" type="text" oninput="formatarMoeda(this)" class="input-field">
                <input id="silagemQtd" type="number" class="input-field">
              </div>
            </div>
          </div>
        </div>

        <button onclick="calcular()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-green-900/20 transition-all active:scale-95 uppercase tracking-widest">
          Atualizar Resultados
        </button>
      </aside>

      <main class="lg:col-span-8 space-y-6">
        <div class="glass-card p-10 flex flex-col items-center justify-center min-h-[400px] relative overflow-hidden">
          <div class="absolute -top-24 -left-24 w-64 h-64 bg-green-500/10 blur-[100px] rounded-full"></div>
          
          <span class="text-zinc-500 font-bold uppercase tracking-[0.3em] text-xs mb-6">Custo Real por Litro</span>
          <div class="flex items-baseline gap-4">
            <span class="text-5xl text-zinc-700 font-light italic">R$</span>
            <span id="custoPorLitro" class="text-[12rem] font-black leading-none tracking-tighter text-white">0,00</span>
          </div>
          
          <div id="statusBox" class="mt-10 px-10 py-3 rounded-full text-sm font-black uppercase tracking-widest border border-zinc-800 bg-zinc-900/50 text-zinc-500">
            Aguardando Lançamentos
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="glass-card p-6 border-l-4 border-l-blue-500">
            <p class="label-text">Custo Total/Dia</p>
            <p id="custoTotal" class="text-3xl font-mono font-bold">R$ 0,00</p>
          </div>
          <div class="glass-card p-6 border-l-4 border-l-yellow-500">
            <p class="label-text">Receita Bruta</p>
            <p id="receitaTotal" class="text-3xl font-mono font-bold">R$ 0,00</p>
          </div>
          <div class="glass-card p-6 border-l-4 border-l-green-500">
            <p class="label-text">Lucro Diário</p>
            <p id="lucroDiario" class="text-3xl font-mono font-bold text-green-500">R$ 0,00</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    function formatarMoeda(input) {
      let v = input.value.replace(/\D/g, '');
      if (!v) { input.value = ''; return; }
      v = (parseInt(v, 10) / 100).toFixed(2) + '';
      v = v.replace('.', ',');
      v = v.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      input.value = 'R$ ' + v;
    }

    function limparMoeda(valor) {
      if (!valor) return 0;
      return parseFloat(valor.replace('R$', '').replace(/\./g, '').replace(',', '.').trim()) || 0;
    }

    function toggleSection(id) {
      const sec = document.getElementById('section-' + id);
      const icon = document.getElementById('icon-' + id);
      const isHidden = sec.style.display === 'none';
      sec.style.display = isHidden ? 'block' : 'none';
      icon.innerText = isHidden ? '▼' : '▲';
    }

    function calcular() {
      const litros = parseFloat(document.getElementById('litros').value) || 0;
      const precoVenda = limparMoeda(document.getElementById('precoVenda').value);

      // Custos Alimentação
      const cSoja = limparMoeda(document.getElementById('sojaKg').value) * (parseFloat(document.getElementById('sojaQtd').value) || 0);
      const cTrigo = limparMoeda(document.getElementById('trigoKg').value) * (parseFloat(document.getElementById('trigoQtd').value) || 0);
      const cSilagem = limparMoeda(document.getElementById('silagemKg').value) * (parseFloat(document.getElementById('silagemQtd').value) || 0);

      const custoTotal = cSoja + cTrigo + cSilagem;
      const custoLitro = litros > 0 ? (custoTotal / litros) : 0;
      const receita = litros * precoVenda;
      const lucro = receita - custoTotal;

      // Atualizar Tela
      document.getElementById('custoPorLitro').innerText = custoLitro.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      document.getElementById('heroMetric').innerText = "R$ " + custoLitro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
      document.getElementById('custoTotal').innerText = "R$ " + custoTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
      document.getElementById('receitaTotal').innerText = "R$ " + receita.toLocaleString('pt-BR', {minimumFractionDigits: 2});
      document.getElementById('lucroDiario').innerText = "R$ " + lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});

      // Status
      const st = document.getElementById('statusBox');
      if (custoLitro > 0) {
        if (custoLitro < precoVenda) {
          st.innerText = "Operação Saudável";
          st.className = "mt-10 px-10 py-3 rounded-full text-sm font-black uppercase tracking-widest border border-green-500 bg-green-950 text-green-400";
        } else {
          st.innerText = "Atenção: Custo Acima da Venda";
          st.className = "mt-10 px-10 py-3 rounded-full text-sm font-black uppercase tracking-widest border border-red-500 bg-red-950 text-red-400";
        }
      }
    }

    function relogio() {
      document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
    }
    setInterval(relogio, 1000);
    relogio();
  </script>
</body>
</html>
