<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dairy Management - Eficiência por Animal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .card-panel { background-color: #0f0f0f; border: 1px solid #27272a; border-radius: 1rem; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-banco { background-color: #18181b; border: 1px solid #3f3f46; color: #fff; text-align: right; font-family: monospace; }
        .input-banco:focus { border-color: #22c55e; outline: none; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-6 bg-zinc-900/50">
        <div class="flex items-center gap-4">
            <span class="text-green-500 font-black italic tracking-tighter text-xl">MILK PRO</span>
            <select id="fazenda" class="bg-transparent border-none text-zinc-400 font-bold text-sm uppercase cursor-pointer outline-none hover:text-white">
                <option value="fazenda1">Fazenda Santa Luzia</option>
                <option value="fazenda2">Fazenda Boa Vista</option>
            </select>
        </div>
        <div id="relogio" class="text-zinc-500 text-xs font-mono uppercase tracking-widest"></div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-4 p-4">
        
        <section class="col-span-3 card-panel p-5 flex flex-col gap-6">
            <div>
                <h2 class="text-zinc-500 text-[10px] font-black uppercase mb-4 tracking-widest">Métricas do Rebanho</h2>
                <label class="text-[10px] text-zinc-400 block mb-1 uppercase">Média de Leite (L / Vaca)</label>
                <input type="text" id="mediaLeite" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-3 rounded-lg text-2xl">
            </div>

            <div class="space-y-4">
                <h2 class="text-zinc-500 text-[10px] font-black uppercase mb-2 tracking-widest">Consumo e Preços</h2>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-zinc-500 block mb-1">SOJA (KG/VACA)</label>
                        <input type="text" id="kgSoja" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-2 rounded text-lg">
                    </div>
                    <div>
                        <label class="text-[9px] text-zinc-500 block mb-1">R$ / KG SOJA</label>
                        <input type="text" id="precoSoja" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-2 rounded text-lg text-yellow-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-zinc-500 block mb-1">TRIGO (KG/VACA)</label>
                        <input type="text" id="kgTrigo" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-2 rounded text-lg">
                    </div>
                    <div>
                        <label class="text-[9px] text-zinc-500 block mb-1">R$ / KG TRIGO</label>
                        <input type="text" id="precoTrigo" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-2 rounded text-lg text-yellow-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-zinc-500 block mb-1">SILAGEM (KG/VACA)</label>
                        <input type="text" id="kgSilo" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-2 rounded text-lg">
                    </div>
                    <div>
                        <label class="text-[9px] text-zinc-500 block mb-1">R$ / KG SILO</label>
                        <input type="text" id="precoSilo" oninput="mask(this); calc()" placeholder="0,00" class="input-banco w-full p-2 rounded text-lg text-yellow-500">
                    </div>
                </div>
            </div>

            <div class="mt-auto p-3 bg-zinc-900/50 rounded-lg text-center border border-zinc-800">
                <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Cálculo de Precisão Alimentar</p>
            </div>
        </section>
