<!-- VERSÃO 2.0 - LEITEPRO -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LeitePro v2.0</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  margin: 0;
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.layout {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 20px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
}

.accordion-header {
  background: #f1f5f9;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.accordion-content {
  display: none;
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.result {
  font-size: 2rem;
  font-weight: bold;
}

.status {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  display: none;
}

.ok { background: #dcfce7; color: green; }
.warn { background: #fee2e2; color: red; }

</style>
</head>

<body>

<div class="container">

<div class="header">
<input id="fazenda" placeholder="Nome da fazenda">
<button onclick="novaFazenda()">Nova fazenda</button>
</div>

<div class="layout">

<!-- INPUT -->
<div class="card">

<h2>Dados</h2>

<div onclick="toggle('a1')" class="accordion-header">
Alimentação <span id="arrow-a1">▾</span>
</div>

<div id="a1" class="accordion-content">
<div class="grid">
<input id="sojaKg" placeholder="Soja R$/kg" oninput="moedaMask(this)">
<input id="sojaQtd" placeholder="kg/dia">

<input id="trigoKg" placeholder="Trigo R$/kg" oninput="moedaMask(this)">
<input id="trigoQtd" placeholder="kg/dia">
</div>
</div>

<div onclick="toggle('a2')" class="accordion-header">
Operação <span id="arrow-a2">▾</span>
</div>

<div id="a2" class="accordion-content">
<div class="grid">
<input id="remedio" placeholder="Remédios" oninput="moedaMask(this)">
<input id="energia" placeholder="Energia" oninput="moedaMask(this)">
<input id="maoobra" placeholder="Mão de obra" oninput="moedaMask(this)">
</div>
</div>

<div onclick="toggle('a3')" class="accordion-header">
Produção <span id="arrow-a3">▾</span>
</div>

<div id="a3" class="accordion-content">
<div class="grid">
<input id="litros" placeholder="Litros/dia">
<input id="preco" placeholder="Preço leite" oninput="moedaMask(this)">
</div>
</div>

<button onclick="calcular()">Calcular</button>

</div>

<!-- RESULTADO -->
<div class="card">

<h2>Resultado</h2>

<div class="result" id="custo">R$ 0,00</div>

<div>
<p>Total: <strong id="total"></strong></p>
<p>Receita: <strong id="receita"></strong></p>
<p>Lucro: <strong id="lucro"></strong></p>
</div>

<div id="status" class="status"></div>

</div>

</div>
</div>

<script>

// máscara
function moedaMask(i){
let v=i.value.replace(/\D/g,'');
v=(v/100).toFixed(2)+'';
v=v.replace(".",",");
v=v.replace(/\B(?=(\d{3})+(?!\d))/g,".");
i.value="R$ "+v;
}

function limpa(v){
return parseFloat(v.replace("R$","").replace(/\./g,"").replace(",","."))
||0;
}

function val(id){
let v=document.getElementById(id).value;
return v.includes("R$")?limpa(v):parseFloat(v)||0;
}

// accordion
function toggle(id){
let c=document.getElementById(id);
c.style.display=c.style.display==="block"?"none":"block";
}

// cálculo
function calcular(){

let custo=
val("sojaKg")*val("sojaQtd")+
val("trigoKg")*val("trigoQtd")+
val("remedio")+
val("energia")+
val("maoobra");

let litros=val("litros");
let preco=val("preco");

if(litros<=0){
alert("Informe litros");
return;
}

let custoLitro=custo/litros;
let receita=litros*preco;
let lucro=receita-custo;

document.getElementById("custo").innerText=moeda(custoLitro);
document.getElementById("total").innerText=moeda(custo);
document.getElementById("receita").innerText=moeda(receita);
document.getElementById("lucro").innerText=moeda(lucro);

// salvar automático
salvar();

let status=document.getElementById("status");
status.style.display="block";

if(lucro>0){
status.className="status ok";
status.innerText="Lucro positivo";
}else{
status.className="status warn";
status.innerText="Prejuízo";
}

}

// salvar dados
function salvar(){
let dados={};
document.querySelectorAll("input").forEach(i=>{
dados[i.id]=i.value;
});
localStorage.setItem("leitepro",JSON.stringify(dados));
}

// carregar
function carregar(){
let d=JSON.parse(localStorage.getItem("leitepro"));
if(!d) return;
for(let id in d){
if(document.getElementById(id)){
document.getElementById(id).value=d[id];
}
}
}

// nova fazenda
function novaFazenda(){
localStorage.clear();
location.reload();
}

// moeda
function moeda(v){
return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

window.onload=carregar;

</script>

</body>
</html>
