<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Leiteiro - Gestão de Custos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ajuste para inputs estilo banco */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .card-bg { background-color: #1a1a1a; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans h-screen overflow-hidden">

    <header class="h-16 border-b border-gray-800 flex items-center justify-between px-6 bg-zinc-900">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-green-500 uppercase">Dairy Manager v1.0</h1>
            <select id="selectFazenda" class="bg-zinc-800 border border-gray-700 text-white p-1 rounded outline-none focus:border-green-500">
                <option>FAZENDA SANTA LUZIA</option>
                <option>FAZENDA BOA VISTA</option>
            </select>
        </div>
        <div class="text-right">
            <p id="dataAtual" class="text-sm font-mono text-gray-400"></p>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 p-4 h-[calc(100vh-64px)]">
        
        <section class="col-span-3 card-bg rounded-lg border border-gray-800 p-4 flex flex-col gap-4">
            <h2 class="text-gray-400 font-bold uppercase text-xs mb-2">Entradas Diárias</h2>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">PRODUÇÃO TOTAL (LITROS)</label>
                    <input type="number" id="prodLeite" placeholder="0,00" class="w-full bg-zinc-800 border border-gray-700 p-3 rounded text-2xl font-bold text-white focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">SOJA (KG)</label>
                    <input type="number" id="inputSoja" placeholder="0.00" class="w-full bg-zinc-800 border border-gray-700 p-2 rounded text-xl text-white outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">TRIGO (KG)</label>
                    <input type="number" id="inputTrigo" placeholder="0.00" class="w-full bg-zinc-800 border border-gray-700 p-2 rounded text-xl text-white outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">SILAGEM (KG)</label>
                    <input type="number" id="inputSilo" placeholder="0.00" class="w-full bg-zinc-800 border border-gray-700 p-2 rounded text-xl text-white outline-none">
                </div>
            </div>

            <button onclick="calcularCusto()" class="mt-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition-all">
                ATUALIZAR INDICADORES
            </button>
        </section>

        <section class="col-span-6 flex flex-col gap-4">
            
            <div class="flex-1 card-bg border border-gray-800 rounded-lg flex flex-col items-center justify-center p-6 shadow-2xl">
                <span class="text-gray-400 uppercase font-semibold">Custo por Litro</span>
                <div class="text-[8rem] font-black leading-none text-white tracking-tighter" id="displayCustoLitro">
                    <span class="text-4xl text-gray-500 mr-2">R$</span>0.00
                </div>
                <div id="statusMargem" class="mt-4 px-6 py-2 rounded-full font-bold text-sm bg-gray-800">
                    AGUARDANDO DADOS
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 h-1/3">
                <div class="card-bg border border-gray-800 rounded-lg p-4">
                    <span class="text-xs text-gray-500 block uppercase">Gasto Total Ração</span>
                    <p id="totalGastoRacao" class="text-3xl font-bold mt-2 text-white">R$ 0,00</p>
                </div>
                <div class="card-bg border border-gray-800 rounded-lg p-4">
                    <span class="text-xs text-gray-500 block uppercase">Ponto de Equilíbrio</span>
                    <p id="pontoEquilibrio" class="text-3xl font-bold mt-2 text-white">0 L/dia</p>
                </div>
            </div>
        </section>

        <section class="col-span-3 card-bg rounded-lg border border-gray-800 p-4">
            <h2 class="text-gray-400 font-bold uppercase text-xs mb-4">Alertas de Manejo</h2>
            
            <div class="space-y-2">
                <div class="p-3 bg-red-900/20 border-l-4 border-red-600 rounded text-xs">
                    <p class="font-bold text-red-400 uppercase text-[10px]">Saúde / Carência</p>
                    <p>Vaca 42: Antibiótico (Descartar leite até 29/03)</p>
                </div>
                <div class="p-3 bg-yellow-900/20 border-l-4 border-yellow-600 rounded text-xs">
                    <p class="font-bold text-yellow-400 uppercase text-[10px]">Estoque Baixo</p>
                    <p>Silo disponível para apenas mais 4 dias.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Simulação de Preços Fixos por quilo (Poderia vir de um cadastro)
        const precos = { soja: 2.80, trigo: 1.90, silo: 0.45 };

        function calcularCusto() {
            const leite = parseFloat(document.getElementById('prodLeite').value) || 0;
            const soja = parseFloat(document.getElementById('inputSoja').value) || 0;
            const trigo = parseFloat(document.getElementById('inputTrigo').value) || 0;
            const silo = parseFloat(document.getElementById('inputSilo').value) || 0;

            if (leite > 0) {
                const totalGasto = (soja * precos.soja) + (trigo * precos.trigo) + (silo * precos.silo);
                const custoPorLitro = totalGasto / leite;

                // Atualiza o Display Central
                document.getElementById('displayCustoLitro').innerHTML = `<span class="text-4xl text-gray-500 mr-2">R$</span>${custoPorLitro.toFixed(2)}`;
                document.getElementById('totalGastoRacao').innerText = `R$ ${totalGasto.toFixed(2)}`;
                
                // Exemplo de Ponto de Equilíbrio (Supondo preço do leite pago a R$ 2.50)
                const pe = totalGasto / 2.50;
                document.getElementById('pontoEquilibrio').innerText = `${pe.toFixed(0)} L/dia`;

                // Logica visual de cor
                const status = document.getElementById('statusMargem');
                if(custoPorLitro < 2.00) {
                    status.innerText = "OPERAÇÃO LUCRATIVA";
                    status.className = "mt-4 px-6 py-2 rounded-full font-bold text-sm bg-green-900 text-green-400";
                } else {
                    status.innerText = "MARGEM APERTADA";
                    status.className = "mt-4 px-6 py-2 rounded-full font-bold text-sm bg-red-900 text-red-400";
                }
            }
        }

        // Data atualizada
        document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-br', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
    </script>
</body>
</html>
