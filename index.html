<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custo por Litro do Leite</title>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.layout {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 20px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
}

h2 {
  margin-bottom: 15px;
}

.accordion-header {
  width: 100%;
  background: #f9fafb;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 12px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.accordion-content {
  display: none;
  padding-top: 10px;
}

.arrow {
  transition: 0.2s;
}

.arrow.open {
  transform: rotate(180deg);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.field input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: #1f4b99;
  color: #fff;
}

.result {
  font-size: 2rem;
  font-weight: bold;
}

.summary div {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.status {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  display: none;
}

.ok {
  background: #ecfdf5;
  color: green;
}

.warn {
  background: #fee2e2;
  color: red;
}
</style>
</head>

<body>

<div class="container">
<div class="layout">

<!-- INPUT -->
<div class="card">
<h2>Dados</h2>

<!-- ALIMENTAÇÃO -->
<button class="accordion-header" onclick="toggle('a1')">
Alimentação diária <span class="arrow" id="arrow-a1">▾</span>
</button>

<div class="accordion-content" id="a1">
<div class="grid">
<div class="field"><input id="sojaKg" placeholder="Soja R$/kg"></div>
<div class="field"><input id="sojaQtd" placeholder="Soja kg/dia"></div>

<div class="field"><input id="trigoKg" placeholder="Trigo R$/kg"></div>
<div class="field"><input id="trigoQtd" placeholder="Trigo kg/dia"></div>

<div class="field"><input id="silagemKg" placeholder="Silagem R$/kg"></div>
<div class="field"><input id="silagemQtd" placeholder="Silagem kg/dia"></div>
</div>
</div>

<!-- SANIDADE -->
<button class="accordion-header" onclick="toggle('a2')">
Sanidade e operação <span class="arrow" id="arrow-a2">▾</span>
</button>

<div class="accordion-content" id="a2">
<div class="grid">
<input id="remedio" placeholder="Remédios/dia">
<input id="energia" placeholder="Energia/dia">
<input id="maoobra" placeholder="Mão de obra/dia">
</div>
</div>

<!-- PRODUÇÃO -->
<button class="accordion-header" onclick="toggle('a3')">
Produção <span class="arrow" id="arrow-a3">▾</span>
</button>

<div class="accordion-content" id="a3">
<div class="grid">
<input id="litros" placeholder="Litros/dia">
<input id="preco" placeholder="Preço do leite">
</div>
</div>

<button class="btn-primary" onclick="calcular()">Calcular</button>

</div>

<!-- RESULTADO -->
<div class="card">
<h2>Resultado</h2>

<div class="result" id="custo">R$ 0,00</div>

<div class="summary">
<div><span>Custo total</span><strong id="total"></strong></div>
<div><span>Receita</span><strong id="receita"></strong></div>
<div><span>Lucro</span><strong id="lucro"></strong></div>
</div>

<div id="status" class="status"></div>

</div>

</div>
</div>

<script>
function v(id){return parseFloat(document.getElementById(id).value)||0}
function moeda(v){return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}

function toggle(id){
let c=document.getElementById(id)
let a=document.getElementById("arrow-"+id)
c.style.display = c.style.display==="block"?"none":"block"
a.classList.toggle("open")
}

function calcular(){

let custo =
v("sojaKg")*v("sojaQtd") +
v("trigoKg")*v("trigoQtd") +
v("silagemKg")*v("silagemQtd") +
v("remedio") +
v("energia") +
v("maoobra")

let litros=v("litros")
let preco=v("preco")

if(litros<=0){
alert("Informe os litros")
return
}

let custoLitro = custo/litros
let receita = litros*preco
let lucro = receita-custo

document.getElementById("custo").innerText = moeda(custoLitro)
document.getElementById("total").innerText = moeda(custo)
document.getElementById("receita").innerText = moeda(receita)
document.getElementById("lucro").innerText = moeda(lucro)

let status = document.getElementById("status")
status.style.display="block"

if(lucro>0){
status.className="status ok"
status.innerText="Lucro positivo"
}else{
status.className="status warn"
status.innerText="Prejuízo"
}

}
</script>

</body>
</html>
