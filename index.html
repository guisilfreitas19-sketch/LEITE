<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeitePro v5.2 | Visual TV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #010409; color: #f8fafc; font-family: sans-serif; transition: background-color 0.8s ease; min-height: 100vh; overflow: hidden; }
    .glass-card { background: rgba(13, 17, 23, 0.9); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(8px); border-radius: 1rem; height: 100%; }
    .input-box { background: #010409; border: 2px solid #21262d; color: #fff; border-radius: 0.75rem; padding: 0.8rem; width: 100%; text-align: right; font-family: monospace; font-size: 1.5rem; font-weight: bold;}
    .input-box:focus { border-color: #facc15; outline: none; box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }
    .label-text { color: #8b949e; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.2rem; display: block; }
    .status-verde { color: #3fb950; }
    .status-amarelo { color: #d29922; }
    .status-vermelho { color: #f85149; }
    progress { -webkit-appearance: none; appearance: none; width: 100%; height: 16px; border-radius: 8px; overflow: hidden; }
    progress::-webkit-progress-bar { background-color: #21262d; border-radius: 8px; }
    .progress-verde::-webkit-progress-value { background-color: #3fb950; }
    .progress-amarelo::-webkit-progress-value { background-color: #d29922; }
    .progress-vermelho::-webkit-progress-value { background-color: #f85149; }
    .bg-saudavel { background-color: #010409; }
    .bg-atencao { background-color: #171c10; }
    .bg-prejuizo { background-color: #1c1010; }
  </style>
</head>
<body id="mainBody" class="p-4 bg-saudavel">

  <div class="max-w-[1900px] mx-auto flex flex-col gap-3">
    
    <header class="flex justify-between items-center pb-2 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-green-700 rounded-lg flex items-center justify-center text-white font-black text-xl">LP</div>
        <h1 class="text-xl font-bold tracking-tight">LeitePro <span class="text-green-600">v5.2</span></h1>
      </div>
      <div class="text-right glass-card px-5 py-2 border border-white/5 rounded-xl h-auto flex gap-4 items-center">
        <p id="relogio" class="text-3xl font-black font-mono tracking-tight text-white leading-none">00:00:00</p>
        <div class="h-8 w-[1px] bg-white/10"></div>
        <p id="dataAtual" class="label-text !mb-0 text-zinc-500 italic">Carregando...</p>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
      
      <aside class="lg:col-span-3 flex flex-col gap-3">
        <div class="glass-card p-4 border-l-4 border-yellow-600">
          <h2 class="font-black text-lg mb-3 italic text-yellow-600 uppercase text-center">Produção</h2>
          <div class="grid grid-cols-1 gap-2.5">
            <div><label class="label-text">Vacas Lote</label><input id="numVacas" type="number" value="20" oninput="executarCalculo()" class="input-box"></div>
            <div><label class="label-text">Média L/Vaca</label><input id="mediaVaca" type="number" value="10" oninput="executarCalculo()" class="input-box text-yellow-500 font-bold"></div>
            <div><label class="label-text">Preço Venda (R$/L)</label><input id="vendaPreco" type="text" value="R$ 2,20" oninput="fMoeda(this)" class="input-box !text-3xl text-yellow-500 font-bold bg-[#13171d]"></div>
          </div>
        </div>

        <div class="glass-card p-4 border-l-4 border-blue-600 flex-1 flex flex-col">
          <h3 class="label-text mb-3 text-blue-500 italic text-center uppercase text-sm">Dieta e Extras (Animal/Dia)</h3>
          <div class="space-y-2 flex-1 flex flex-col justify-between">
            <div class="grid grid-cols-5 gap-2.5 items-center">
              <input id="siloQtd" type="number" value="15" oninput="executarCalculo()" class="input-box !text-base !p-3 col-span-2">
              <span class="text-[10px] text-zinc-600 text-center font-bold col-span-1">SILO KG @</span>
              <input id="siloPreco" type="text" value="R$ 0,20" oninput="fMoeda(this)" class="input-box !text-base !p-3 col-span-2">
            </div>
            <div class="grid grid-cols-5 gap-2.5 items-center">
              <input id="sojaQtd" type="number" value="2" oninput="executarCalculo()" class="input-box !text-base !p-3 col-span-2">
              <span class="text-[10px] text-zinc-600 text-center font-bold col-span-1">SOJA KG @</span>
              <input id="sojaPreco" type="text" value="R$ 1,80" oninput="fMoeda(this)" class="input-box !text-base !p-3 col-span-2">
            </div>
            <div class="grid grid-cols-5 gap-2.5 items-center">
              <input id="trigoQtd" type="number" value="2" oninput="executarCalculo()" class="input-box !text-base !p-3 col-span-2">
              <span class="text-[10px] text-zinc-600 text-center font-bold col-span-1">TRIGO KG @</span>
              <input id="trigoPreco" type="text" value="R$ 1,00" oninput="fMoeda(this)" class="input-box !text-base !p-3 col-span-2">
            </div>
            <div class="pt-2 border-t border-white/10 mt-2">
              <label class="label-text text-orange-400">Medicamentos/Outros (R$/Dia)</label>
              <input id="extraCusto" type="text" value="R$ 0,25" oninput="fMoeda(this)" class="input-box !text-base !p-3 !text-orange-400 bg-[#13171d]">
            </div>
          </div>
        </div>
      </aside>

      <main class="lg:col-span-9 flex flex-col gap-4">
        <div id="lucroCard" class="glass-card p-5 flex flex-col items-center justify-center relative min-h-[420px]">
          <span class="label-text tracking-[0.5em] mb-0 text-zinc-500 text-sm">Lucro Diário Líquido</span>
          <div class="flex items-baseline">
            <span class="text-4xl text-zinc-700 font-light mr-4">R$</span>
            <span id="resLucroDia" class="text-[12rem] font-black leading-none tracking-tighter">0,00</span>
          </div>
          
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/5 border border-white/10 px-8 py-3 rounded-full flex gap-10 items-center">
              <div class="text-center">
                  <p class="label-text !mb-0 text-[10px]">Ponto de Equilíbrio</p>
                  <p id="resBreakEven" class="text-2xl font-black text-white">0.00 L</p>
              </div>
              <div class="h-10 w-[1px] bg-white/10"></div>
              <div class="text-center">
                  <p class="label-text !mb-0 text-[10px]">Sobra p/ Vaca</p>
                  <p id="resSobraVaca" class="text-2xl font-black">0.00 L</p>
              </div>
          </div>

          <div class="absolute top-4 right-6 text-right bg-black/40 px-6 py-2.5 rounded-2xl border border-white/5">
            <p class="label-text">Produção Lote</p>
            <p id="totalLitros" class="text-3xl font-black text-green-500">0 L/DIA</p>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="glass-card p-5 border-b-4 border-green-600 bg-green-500/5 text-center flex flex-col justify-center">
            <span class="label-text text-green-500">Lucro Estimado Mensal</span>
            <p id="resLucroMes" class="text-6xl font-black mt-1">R$ 0,00</p>
          </div>
          
          <div class="glass-card p-5 border-b-4 border-blue-600 bg-blue-500/5 flex flex-col justify-center">
            <div class="flex justify-between items-center mb-1">
              <span class="label-text text-blue-500 !mb-0">Eficiência Alimentar (IOFC)</span>
              <span id="resIofcValor" class="text-2xl font-bold font-mono">0.00</span>
            </div>
            <progress id="resIofcBarra" value="0" max="100" class="progress-verde"></progress>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    function fMoeda(i) {
      let v = i.value.replace(/\D/g, "");
      if (v.length === 0) { i.value = ""; executarCalculo(); return; }
      v = (parseInt(v) / 100).toFixed(2).replace(".", ",");
      v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      i.value = "R$ " + v;
      executarCalculo();
    }

    function limpar(v) {
      if (!v || v === "") return 0;
      let n = v.replace("R$", "").replace(/\./g, "").replace(",", ".").trim();
      return parseFloat(n) || 0;
    }

    function atualizarRelogio() {
        const agora = new Date();
        document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
        const fDate = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
        document.getElementById('dataAtual').innerText = fDate.toUpperCase();
    }

    function salvarDados() {
        const dados = {
            nV: document.getElementById('numVacas').value,
            mV: document.getElementById('mediaVaca').value,
            pV: document.getElementById('vendaPreco').value,
            sP: document.getElementById('siloPreco').value,
            jP: document.getElementById('sojaPreco').value,
            tP: document.getElementById('trigoPreco').value,
            eC: document.getElementById('extraCusto').value
        };
        localStorage.setItem('leiteProDados', JSON.stringify(dados));
    }

    function carregarDados() {
        const salvo = localStorage.getItem('leiteProDados');
        if (salvo) {
            const d = JSON.parse(salvo);
            document.getElementById('numVacas').value = d.nV;
            document.getElementById('mediaVaca').value = d.mV;
            document.getElementById('vendaPreco').value = d.pV;
            document.getElementById('siloPreco').value = d.sP;
            document.getElementById('sojaPreco').value = d.jP;
            document.getElementById('trigoPreco').value = d.tP;
            document.getElementById('extraCusto').value = d.eC;
        }
    }

    function executarCalculo() {
      const nV = parseFloat(document.getElementById('numVacas').value) || 0;
      const mV = parseFloat(document.getElementById('mediaVaca').value) || 0;
      const pV = limpar(document.getElementById('vendaPreco').value);
      
      const tLitrosDia = nV * mV;
      document.getElementById('totalLitros').innerText = tLitrosDia.toLocaleString('pt-BR') + " L/DIA";

      const custoDietaVaca = 
        (parseFloat(document.getElementById('siloQtd').value) || 0) * limpar(document.getElementById('siloPreco').value) +
        (parseFloat(document.getElementById('sojaQtd').value) || 0) * limpar(document.getElementById('sojaPreco').value) +
        (parseFloat(document.getElementById('trigoQtd').value) || 0) * limpar(document.getElementById('trigoPreco').value);

      const custoIndividual = custoDietaVaca + limpar(document.getElementById('extraCusto').value);
      const lucroLoteDia = (tLitrosDia * pV) - (custoIndividual * nV);
      
      const breakEvenLitros = pV > 0 ? (custoIndividual / pV) : 0;
      const sobraLitrosVaca = mV - breakEvenLitros;
      const eficiencaAlimentar = custoDietaVaca > 0 ? ((mV * pV) / custoDietaVaca) : 0;

      const f = { minimumFractionDigits: 2, maximumFractionDigits: 2 };
      
      document.getElementById('resBreakEven').innerText = breakEvenLitros.toLocaleString('pt-BR', f) + " L";
      document.getElementById('resSobraVaca').innerText = (sobraLitrosVaca > 0 ? "+" : "") + sobraLitrosVaca.toLocaleString('pt-BR', f) + " L";
      document.getElementById('resSobraVaca').className = "text-2xl font-black " + (sobraLitrosVaca >= 0 ? "status-verde" : "status-vermelho");

      const elLucro = document.getElementById('resLucroDia');
      elLucro.innerText = Math.abs(lucroLoteDia).toLocaleString('pt-BR', f);
      document.getElementById('resLucroMes').innerText = "R$ " + (lucroLoteDia * 30).toLocaleString('pt-BR', f);

      const body = document.getElementById('mainBody');
      body.className = "p-4 " + (lucroLoteDia > 50 ? 'bg-saudavel' : (lucroLoteDia >= 0 ? 'bg-atencao' : 'bg-prejuizo'));
      elLucro.className = "text-[12rem] font-black leading-none tracking-tighter " + (lucroLoteDia >= 0 ? 'status-verde' : 'status-vermelho');

      document.getElementById('resIofcValor').innerText = eficiencaAlimentar.toLocaleString('pt-BR', f);
      const progBar = document.getElementById('resIofcBarra');
      progBar.value = Math.min((eficiencaAlimentar / 2.5) * 100, 100);
      progBar.className = eficiencaAlimentar < 1.0 ? "progress-vermelho" : (eficiencaAlimentar < 1.4 ? "progress-amarelo" : "progress-verde");
      
      salvarDados();
    }

    window.onload = function() { carregarDados(); atualizarRelogio(); setTimeout(executarCalculo, 300); setInterval(atualizarRelogio, 1000); };
  </script>
</body>
</html>
