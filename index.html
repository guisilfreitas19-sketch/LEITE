<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeitePro v3.8 | Gestão de Rebanho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 1.5rem; }
    .input-field { background: #1e293b; border: 2px solid #334155; color: #fff; border-radius: 0.75rem; padding: 0.8rem; width: 100%; text-align: right; font-family: monospace; font-size: 1.25rem; }
    .input-field:focus { border-color: #facc15; outline: none; background: #0f172a; }
    .label-text { color: #94a3b8; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.3rem; display: block; }
    .status-verde { color: #22c55e; }
    .status-vermelho { color: #ef4444; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <aside class="lg:col-span-4 space-y-4">
      <div class="glass-card p-6 border-l-4 border-yellow-500">
        <h2 class="font-black text-xl mb-4 italic text-yellow-500 uppercase">Produção do Lote</h2>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="label-text">Vacas</label>
            <input id="numVacas" type="number" value="20" oninput="calcular()" class="input-field">
          </div>
          <div>
            <label class="label-text">Média L/Vaca</label>
            <input id="mediaVaca" type="number" value="10" oninput="calcular()" class="input-field">
          </div>
        </div>
        <label class="label-text text-yellow-400">Preço de Venda (Litro)</label>
        <input id="vendaPreco" type="text" value="R$ 2,20" oninput="fMoeda(this)" class="input-field !text-3xl text-yellow-500">
      </div>

      <div class="glass-card p-6 border-l-4 border-blue-500">
        <h3 class="label-text mb-4 text-blue-400 italic">Dieta Individual (Por Animal)</h3>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-2">
            <div><label class="label-text text-[10px]">Silo KG</label><input id="siloQtd" type="number" value="15" oninput="calcular()" class="input-field !text-base"></div>
            <div><label class="label-text text-[10px]">Preço Silo</label><input id="siloPreco" type="text" value="R$ 0,45" oninput="fMoeda(this)" class="input-field !text-base"></div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div><label class="label-text text-[10px]">Soja KG</label><input id="sojaQtd" type="number" value="2" oninput="calcular()" class="input-field !text-base"></div>
            <div><label class="label-text text-[10px]">Preço Soja</label><input id="sojaPreco" type="text" value="R$ 2,00" oninput="fMoeda(this)" class="input-field !text-base"></div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div><label class="label-text text-[10px]">Trigo KG</label><input id="trigoQtd" type="number" value="2" oninput="calcular()" class="input-field !text-base"></div>
            <div><label class="label-text text-[10px]">Preço Trigo</label><input id="trigoPreco" type="text" value="R$ 1,50" oninput="fMoeda(this)" class="input-field !text-base"></div>
          </div>
        </div>
      </div>
    </aside>

    <main class="lg:col-span-8 flex flex-col gap-6">
      <div class="glass-card p-8 flex flex-col items-center justify-center relative flex-1 min-h-[350px]">
        <span class="label-text tracking-[0.4em] mb-2 text-zinc-500">Lucro Diário Líquido</span>
        <div class="flex items-baseline">
          <span class="text-4xl text-zinc-700 font-light mr-4">R$</span>
          <span id="resLucroDia" class="text-[10rem] font-black leading-none tracking-tighter status-verde">0,00</span>
        </div>
        <div class="absolute top-6 right-8 text-right bg-black/40 px-6 py-3 rounded-2xl border border-white/5">
          <p class="label-text">Produção Lote</p>
          <p id="totalLitros" class="text-3xl font-black text-green-500">200 L/DIA</p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass-card p-6 border-b-4 border-green-600 bg-green-500/5 text-center">
          <span class="label-text text-green-500">Lucro Mensal (30 dias)</span>
          <p id="resLucroMes" class="text-6xl font-black mt-2 status-verde">R$ 0,00</p>
        </div>
        <div class="glass-card p-6 border-b-4 border-blue-600 text-center">
          <span class="label-text text-blue-500 text-center">Faturamento Bruto</span>
          <p id="resFaturaMes" class="text-6xl font-black mt-2 text-zinc-400">R$ 0,00</p>
        </div>
      </div>

      <div class="glass-card p-6 grid grid-cols-3 gap-4 text-center border-t border-white/5">
        <div><p class="label-text">Custo/Litro</p><p id="resCustoL" class="font-bold text-2xl text-white">R$ 0,00</p></div>
        <div><p class="label-text text-yellow-500">Sobra/Litro</p><p id="resSobraL" class="font-bold text-2xl text-yellow-500">R$ 0,00</p></div>
        <div><p class="label-text text-red-400">Gasto Mensal</p><p id="resCustoMes" class="font-bold text-2xl text-red-400">R$ 0,00</p></div>
      </div>
    </main>
  </div>

  <script>
    function fMoeda(i) {
      let v = i.value.replace(/\D/g, "");
      if (v.length === 0) { i.value = ""; calcular(); return; }
      v = (parseInt(v) / 10
