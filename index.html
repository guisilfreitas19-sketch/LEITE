<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeitePro v5.0 | Centro de Comando</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Estilos Básicos e Transições */
    body { background-color: #020617; color: #f8fafc; font-family: sans-serif; overflow: hidden; transition: background-color 0.8s ease; }
    .glass-card { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 1.5rem; transition: all 0.5s ease; }
    .input-field { background: #1e293b; border: 2px solid #334155; color: #fff; border-radius: 0.75rem; padding: 0.5rem; width: 100%; text-align: right; font-family: monospace; font-size: 1.1rem; }
    .input-field:focus { border-color: #facc15; outline: none; box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }
    .label-text { color: #94a3b8; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.2rem; display: block; }
    
    /* Cores de Status */
    .status-verde { color: #22c55e; }
    .status-amarelo { color: #facc15; }
    .status-vermelho { color: #ef4444; }

    /* Estilos das Barras de Progresso */
    progress { -webkit-appearance: none; appearance: none; width: 100%; height: 12px; border-radius: 6px; overflow: hidden; }
    progress::-webkit-progress-bar { background-color: #1e293b; border-radius: 6px; }
    progress::-webkit-progress-value { border-radius: 6px; transition: width 0.5s ease; }
    
    /* Cores Dinâmicas para Webkit */
    .progress-verde::-webkit-progress-value { background-color: #22c55e; }
    .progress-amarelo::-webkit-progress-value { background-color: #facc15; }
    .progress-vermelho::-webkit-progress-value { background-color: #ef4444; }

    /* Transições de Fundo */
    .bg-saudavel { background-color: #020617; } /* Padrão Escuro */
    .bg-atencao { background-color: #171c10; } /* Leve Tom Amarelado */
    .bg-prejuizo { background-color: #1c1010; } /* Leve Tom Avermelhado */
  </style>
</head>
<body id="mainBody" class="p-4 md:p-6 bg-saudavel">

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-5 relative">
    
    <header class="lg:col-span-12 flex justify-between items-center pb-3 border-b border-white/5 mb-2">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center text-white font-black text-lg">LP</div>
        <h1 class="text-xl font-bold tracking-tight">LeitePro <span class="text-green-500">v5.0</span></h1>
      </div>
      <div class="text-right glass-card px-4 py-2 border border-white/5 rounded-xl">
        <p id="dataAtual" class="label-text !mb-0 text-zinc-500">Aguardando data...</p>
        <p id="relogio" class="text-2xl font-black font-mono tracking-tight text-white">00:00:00</p>
      </div>
    </header>

    <aside class="lg:col-span-4 space-y-4">
      <div class="glass-card p-5 border-l-4 border-yellow-500">
        <h2 class="font-black text-lg mb-3 italic text-yellow-500 uppercase text-center">Produção</h2>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div><label class="label-text">Vacas Lote</label><input id="numVacas" type="number" value="20" oninput="executarCalculo()" class="input-field"></div>
          <div><label class="label-text">Média L/Vaca</label><input id="mediaVaca" type="number" value="10" oninput="executarCalculo()" class="input-field text-yellow-500 font-bold"></div>
        </div>
        <label class="label-text text-yellow-400">Preço Venda (R$/L)</label>
        <input id="vendaPreco" type="text" value="R$ 2,20" oninput="fMoeda(this)" class="input-field !text-2xl text-yellow-500 font-bold">
      </div>

      <div class="glass-card p-5 border-l-4 border-blue-500">
        <h3 class="label-text mb-4 text-blue-400 italic text-center">Dieta e Extras (Por Animal)</h3>
        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-2">
            <div><label class="label-text text-[10px]">Silo KG</label
